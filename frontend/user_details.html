<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details | IDP Intelligence</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .simple-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .simple-card {
            width: 100%;
            max-width: 560px;
        }
        .simple-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .simple-form label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .simple-form input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
        }
        .simple-form input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .simple-submit {
            border: 1px solid var(--primary);
            background: rgba(34, 211, 238, 0.15);
            color: var(--primary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .simple-error {
            color: #fca5a5;
            font-size: 0.85rem;
            min-height: 1rem;
        }
    </style>
</head>
<body>
    <div class="simple-page">
        <section class="glass simple-card">
            <div class="panel-header">
                <h2>User Access Details</h2>
                <span class="badge">Step 1</span>
            </div>
            <p style="margin-bottom:1rem;color:var(--text-dim);">
                Enter your Gmail and phone number to continue.
            </p>
            <form id="details-form" class="simple-form">
                <div>
                    <label for="email">Gmail address</label>
                    <input id="email" type="email" placeholder="you@gmail.com" required>
                </div>
                <div>
                    <label for="phone">Phone number</label>
                    <input id="phone" type="tel" placeholder="+91 9876543210" required>
                </div>
                <div>
                    <label>Verify you are a real user</label>
                    <div class="cf-turnstile" data-sitekey="__TURNSTILE_SITE_KEY__"></div>
                </div>
                <div id="error" class="simple-error"></div>
                <button class="simple-submit" type="submit">Continue</button>
            </form>
        </section>
    </div>
    <script src="/static/user_details.js"></script>
</body>
</html>
